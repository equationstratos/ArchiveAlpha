<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Archive Alpha - Hygiène & Soins</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --bg: #0b0b0b; --card-bg: #141414; --accent: #00ff9d; }
        body { 
            background-color: var(--bg); color: #e0e0e0; 
            font-family: 'Inter', sans-serif; overflow: hidden;
            height: 100vh; display: flex; flex-direction: column;
        }
        
        .header { padding: 10px 20px; border-bottom: 1px solid #222; background: #0f0f0f; }
        .search-bar { 
            background: #1a1a1a; border: 1px solid #333; color: white; 
            border-radius: 6px; padding: 6px 15px; width: 300px; outline: none; font-size: 0.9rem;
        }
        .nav-pills { padding: 10px; background: #0f0f0f; border-bottom: 1px solid #222; justify-content: center; }
        .nav-link { 
            color: #666 !important; text-transform: uppercase; font-size: 0.7rem; 
            font-weight: 700; letter-spacing: 1px; padding: 8px 15px !important;
            transition: all 0.2s; border-radius: 4px !important;
        }
        .nav-link.active { background-color: var(--accent) !important; color: #000 !important; }
        .nav-link:hover:not(.active) { color: #aaa !important; background: #1a1a1a; }
        
        .tab-content { flex-grow: 1; padding: 20px; overflow-y: auto; }
        
        .card { 
            background-color: var(--card-bg) !important; border: 1px solid #222 !important;
            transition: all 0.1s ease; min-height: 80px; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            border-radius: 6px; padding: 5px !important;
        }
        .card:hover { transform: scale(1.03); border-color: var(--accent) !important; background: #1c1c1c !important; }
        
        .title { 
            font-size: 0.6rem; font-weight: 700; margin-top: 6px; 
            text-transform: uppercase; color: #888; text-align: center;
        }
        .emoji-box { font-size: 1.2rem; }
        a { text-decoration: none !important; }
        .d-none-search { display: none !important; }
        
        .back-link { font-size: 0.7rem; color: #444; text-decoration: none; font-weight: bold; }
        .back-link:hover { color: var(--accent); }
    </style>
</head>
<body>

<div class="header d-flex justify-content-between align-items-center">
    <div class="d-flex align-items-center">
        <a href="../index.html" class="back-link me-3">CORE_OS</a>
        <div style="font-weight: 900; letter-spacing: 2px; font-size: 0.8rem; color: var(--accent);">SUB_MODULE: HYGIENE</div>
    </div>
    <input type="text" id="searchInput" class="search-bar" placeholder="Rechercher un protocole..." autocomplete="off" />
</div>

<ul class="nav nav-pills" id="pills-tab" role="tablist">
    <li class="nav-item"><button class="nav-link active" data-bs-toggle="pill" data-bs-target="#care">Corps & Soins</button></li>
    <li class="nav-item"><button class="nav-link" data-bs-toggle="pill" data-bs-target="#clean">Entretien</button></li>
    <li class="nav-item"><button class="nav-link" data-bs-toggle="pill" data-bs-target="#extraction">Production</button></li>
</ul>

<div class="tab-content" id="pills-tabContent">
    
    <div class="tab-pane fade show active" id="care">
        <div class="row g-2">
            <div class="col-3 col-md-2 col-lg-1">
                <a href="./savon.html">
                    <div class="card card-body">
                        <span class="emoji-box">🧼</span>
                        <h6 class="title">Savon</h6>
                    </div>
                </a>
            </div>
            <div class="col-3 col-md-2 col-lg-1">
                <a href="./dentifrice.html">
                    <div class="card card-body">
                        <span class="emoji-box">🪥</span>
                        <h6 class="title">Dentifrice</h6>
                    </div>
                </a>
            </div>
            <div class="col-3 col-md-2 col-lg-1">
                <a href="./parfum.html">
                    <div class="card card-body">
                        <span class="emoji-box">🌸</span>
                        <h6 class="title">Parfum</h6>
                    </div>
                </a>
            </div>
        </div>
    </div>

    <div class="tab-pane fade" id="clean">
        <div class="row g-2">
            <div class="col-3 col-md-2 col-lg-1">
                <a href="./lessive.html">
                    <div class="card card-body">
                        <span class="emoji-box">🧴</span>
                        <h6 class="title">Lessive</h6>
                    </div>
                </a>
            </div>
        </div>
    </div>

    <div class="tab-pane fade" id="extraction">
        <div class="row g-2">
            <div class="col-3 col-md-2 col-lg-1">
                <a href="./huiles.html">
                    <div class="card card-body">
                        <span class="emoji-box">⚗️</span>
                        <h6 class="title">Huiles Ess.</h6>
                    </div>
                </a>
            </div>
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
    document.getElementById('searchInput').addEventListener('input', function() {
        let filter = this.value.toLowerCase();
        let cards = document.querySelectorAll('.card');
        let tabs = document.querySelectorAll('.tab-pane');
        
        if (filter.length > 0) {
            tabs.forEach(t => { t.classList.add('show', 'active'); });
            document.querySelector('.nav-pills').style.display = 'none';
        } else {
            tabs.forEach((t, i) => { 
                 t.classList.remove('show', 'active'); 
                 if(i === 0) t.classList.add('show', 'active');
            });
            document.querySelector('.nav-pills').style.display = 'flex';
        }
        
        cards.forEach(card => {
            let title = card.querySelector('.title').innerText.toLowerCase();
            let parent = card.closest('[class^="col"]');
            if (title.includes(filter)) {
                parent.classList.remove('d-none-search');
            } else {
                parent.classList.add('d-none-search');
            }
        });
    });
</script>

</body>
</html>
