<script>
    document.getElementById('searchInput').addEventListener('input', function() {
        let filter = this.value.toLowerCase();
        let cards = document.querySelectorAll('.card');
        let tabs = document.querySelectorAll('.tab-pane');
        let navPills = document.querySelector('.nav-pills');
        
        if (filter.length > 0) {
            tabs.forEach(t => { t.classList.add('show', 'active'); });
            navPills.style.display = 'none';
        } else {
            tabs.forEach((t, i) => { 
                 t.classList.remove('show', 'active'); 
                 if(i === 0) t.classList.add('show', 'active');
            });
            navPills.style.display = 'flex';
        }
        
        cards.forEach(card => {
            let title = card.querySelector('.title').innerText.toLowerCase();
            let parent = card.closest('[class^="col"]');
            if (title.includes(filter)) {
                parent.classList.remove('d-none-search');
            } else {
                parent.classList.add('d-none-search');
            }
        });
    });
</script>
